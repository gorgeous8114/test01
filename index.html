<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sie werden zu Ihrer E-Mail weitergeleitet...</title>
    <style>
        /* 重置基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            /* 漂亮的渐变背景 */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* 居中的卡片容器 */
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        /* CSS 加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #5a8dee;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 文本样式 */
        h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        /* 超链接按钮样式 */
        .mail-btn {
            display: inline-block;
            background-color: #5a8dee;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .mail-btn:hover {
            background-color: #4371d3;
            box-shadow: 0 4px 12px rgba(90, 141, 238, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        
        <h1>Sie werden zu Ihrer E-Mail weitergeleitet, bitte warten Sie...</h1>
        <p>Das System versucht, Ihren lokalen E-Mail-Client zu starten.</p>
        
        <a href="mailto:love-after@outlook.com?subject=来自网站的咨询&body=你好，我想了解更多信息：" class="mail-btn" id="mailLink">
            Falls Sie nicht automatisch weitergeleitet werden, klicken Sie bitte hier.
        </a>
    </div>

    <script>
        // 页面加载完成后，延迟 1.5 秒自动触发邮箱拉起（为了让用户看到漂亮的过渡界面）
        window.onload = function() {
            setTimeout(function() {
                // 获取 a 标签的 href 属性并自动跳转
                var mailUrl = document.getElementById('mailLink').href;
                window.location.href = mailUrl;
            }, 1500); 
        };
    </script>

</body>
</html>
